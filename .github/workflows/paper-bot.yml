name: Paper Trading Bot

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials.json
        run: |
          cat > credentials.json <<'EOF'
          ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          EOF

      - name: Run one decision cycle
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          BOT_RUN_ONCE: "true"
          GOOGLE_SHEETS_NAME: "Trading Log"
          GOOGLE_CREDENTIALS_FILE: "credentials.json"
        run: python main.py

      - name: Commit and Push Bot State
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # Stage the memory state file and the local csv journal if they exist
          git add bot_state.json trade_journal.csv || true
          # Only commit if changes were actually detected to prevent empty commit errors
          if ! git diff --cached --quiet; then
            git commit -m "Sync tracking state and logs [skip ci]"
            git push origin main
          else
            echo "No state updates to sync this cycle."
          fi
